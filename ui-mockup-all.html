<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Peacock UI Mockups — All Styles</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #1a1a1a;
    color: #fff;
    padding: 40px;
  }
  h1 { text-align: center; font-size: 28px; font-weight: 700; margin-bottom: 8px; }
  .subtitle { text-align: center; font-size: 14px; color: #888; margin-bottom: 40px; }

  .grid {
    display: flex;
    flex-direction: column;
    gap: 60px;
    max-width: 1200px;
    margin: 0 auto;
  }
  .mockup-section {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .mockup-title {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .mockup-desc {
    font-size: 13px;
    color: #888;
    margin-bottom: 16px;
  }
  iframe {
    width: 980px;
    height: 660px;
    border: none;
    border-radius: 16px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.4);
  }
</style>
</head>
<body>

<h1>Peacock UI Mockups</h1>
<p class="subtitle">三种风格对比，选择你最喜欢的方向</p>

<div class="grid">
  <div class="mockup-section">
    <div class="mockup-title">1. Bandcamp Style — 清爽 Teal</div>
    <div class="mockup-desc">白底、teal 强调色、简洁文字导航、渐变气泡</div>
    <iframe src="http://localhost:3460/"></iframe>
  </div>

  <div class="mockup-section">
    <div class="mockup-title">2. Warm Dashboard — 暖色温馨</div>
    <div class="mockup-desc">米灰暖底、金黄强调、图标导航栏、深色发送气泡</div>
    <iframe src="http://localhost:3461/"></iframe>
  </div>

  <div class="mockup-section">
    <div class="mockup-title">3. Fenco Style — 紫色高级</div>
    <div class="mockup-desc">深色图标栏、紫色强调、圆形头像、商务质感</div>
    <iframe src="http://localhost:3462/"></iframe>
  </div>
</div>

</body>
</html>
