name: Peacock
options:
  bundleIdPrefix: com.jlynnc
  deploymentTarget:
    iOS: "16.0"
    macOS: "13.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"

targets:
  Peacock:
    type: application
    platform: [iOS, macOS]
    sources:
      - path: Peacock
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.peacock.app
        MARKETING_VERSION: "1.0.2"
        CURRENT_PROJECT_VERSION: 3
        INFOPLIST_FILE: Peacock/Info.plist
        SWIFT_VERSION: "6.0"
        DEVELOPMENT_TEAM: G58K5HLBG5
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Automatic
        ENABLE_USER_SCRIPT_SANDBOXING: false
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "-"
        Release:
          CODE_SIGN_IDENTITY: "Apple Development"
    dependencies:
      - package: GRDB
      - target: ShareExtension
        embed: true
        platforms: [iOS]
    entitlements:
      path: Peacock/Peacock.entitlements
      properties:
        com.apple.security.network.client: true
        com.apple.security.network.server: true
        com.apple.security.application-groups:
          - group.com.peacock.app

  ShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ShareExtension
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.peacock.app.ShareExtension
        MARKETING_VERSION: "1.0.2"
        CURRENT_PROJECT_VERSION: 3
        INFOPLIST_FILE: ShareExtension/Info.plist
        SWIFT_VERSION: "6.0"
        DEVELOPMENT_TEAM: G58K5HLBG5
        CODE_SIGN_STYLE: Automatic
        ENABLE_USER_SCRIPT_SANDBOXING: false
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "-"
        Release:
          CODE_SIGN_IDENTITY: "Apple Development"
    entitlements:
      path: ShareExtension/ShareExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.peacock.app
